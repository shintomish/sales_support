#version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sales_support_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - sales_support_network

  db:
    image: mysql:8.0
    container_name: sales_support_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sales_support
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: password
      MYSQL_USER: laravel
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - sales_support_network

  nginx:
    image: nginx:alpine
    container_name: sales_support_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - sales_support_network

networks:
  sales_support_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
